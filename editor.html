<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InCaseYou - Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gorditas:wght@400;700&family=Great+Vibes&family=Inter:wght@300;400;500&family=Nunito:wght@400;600&family=Cedarville+Cursive&family=La+Belle+Aurore&family=Space+Mono&family=Roboto+Mono&family=Patrick+Hand&family=Indie+Flower&family=Instrument+Serif&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/geist@1.0.3/dist/fonts/geist-sans/style.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
</head>
<body data-page="editor" class="editor-body">
    <div class="editor-layout">
        <!-- Editor Header / Back Button -->
        <header class="editor-header">
            <button id="btn-back-collection" class="btn-icon-text">&larr; <span id="editor-title-display">open when you miss me</span></button>
            <div class="header-right">
                <span class="status-text">SAVED</span>
                <button class="btn-icon" title="Rename">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="btn-icon" title="Delete">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                </button>
                <button class="btn-icon" title="Preview">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
                <button class="btn-outline btn-small">UNPUBLISH</button>
            </div>
        </header>

        <div class="editor-main-area">
            <!-- Left Sidebar -->
            <aside class="editor-sidebar">
                <section class="sidebar-section">
                    <h3 class="sidebar-title">ELEMENTS</h3>
                    <div class="elements-grid">
                        <button class="element-btn" id="btn-add-text">
                            <svg class="elem-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
                            TEXT
                        </button>
                        <button class="element-btn" id="btn-add-link">
                            <svg class="elem-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                            LINK
                        </button>
                        <button class="element-btn" id="btn-add-image">
                            <svg class="elem-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            IMAGE
                        </button>
                        <button class="element-btn" id="btn-add-audio">
                            <svg class="elem-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                            AUDIO
                        </button>
                        <button class="element-btn" id="btn-add-video">
                            <svg class="elem-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="15" height="13" rx="2" ry="2"/><polyline points="17 12 22 8 22 18 17 14"/></svg>
                            VIDEO
                        </button>
                    </div>
                </section>

                <section class="sidebar-section">
                    <div class="sidebar-title-row">
                        <h3 class="sidebar-title">STICKERS</h3>
                        <div class="scroll-controls">
                            <button>&lt;</button>
                            <button>&gt;</button>
                        </div>
                    </div>
                    <div class="stickers-gallery" id="stickers-gallery">
                        <!-- Stickers will be injected here. For now, placeholders. -->
                        <div class="sticker-thumb" data-src="images/envelope.png" style="background-image: url('images/envelope.png');"></div>
                    </div>
                </section>

                <section class="sidebar-section">
                    <div class="sidebar-title-row">
                        <h3 class="sidebar-title">PHOTOCARD</h3>
                        <input type="checkbox" id="toggle-photocard" class="styled-checkbox">
                    </div>
                    <div class="photocard-upload-area hidden" id="photocard-upload-area">
                        <input type="file" id="photocard-input" accept="image/*" hidden>
                        <button id="btn-upload-photocard" class="dashed-upload-box">
                            <span class="icon-plus">⊕</span>
                            ADD IMAGE
                        </button>
                    </div>
                </section>

                <section class="sidebar-section">
                    <h3 class="sidebar-title">BACKGROUND</h3>
                    <div class="backgrounds-gallery" id="backgrounds-gallery">
                        <button class="bg-swatch" data-bg="images/bgs/green blur.png" style="background-image: url('images/bgs/green blur.png'); background-size: cover;"></button>
                        <button class="bg-swatch" data-bg="images/bgs/coastal.png" style="background-image: url('images/bgs/coastal.png'); background-size: cover;"></button>
                        <button class="bg-swatch" data-bg="images/bgs/paper grid.png" style="background-image: url('images/bgs/paper grid.png'); background-size: cover;"></button>
                        <button class="bg-swatch" data-bg="images/bgs/knit.png" style="background-image: url('images/bgs/knit.png'); background-size: cover;"></button>
                        <button class="bg-swatch" data-bg="images/bgs/window.png" style="background-image: url('images/bgs/window.png'); background-size: cover;"></button>
                        <button class="bg-swatch" data-bg="images/bgs/clouds.png" style="background-image: url('images/bgs/clouds.png'); background-size: cover;"></button>
                        <button class="bg-swatch" data-bg="images/bgs/pink flowers.png" style="background-image: url('images/bgs/pink flowers.png'); background-size: cover;"></button>
                        <button class="bg-swatch" data-bg="images/bgs/stormy.png" style="background-image: url('images/bgs/stormy.png'); background-size: cover;"></button>
                        <button class="bg-swatch" data-bg="images/bgs/starry night.png" style="background-image: url('images/bgs/starry night.png'); background-size: cover;"></button>
                        <button class="bg-swatch" data-bg="images/bgs/red plaid.png" style="background-image: url('images/bgs/red plaid.png'); background-size: cover;"></button>
                        <button class="bg-swatch add-bg" id="btn-add-bg">+</button>
                        <input type="file" id="bg-input" accept="image/*" hidden>
                    </div>
                </section>
            </aside>

            <!-- Canvas Area -->
            <main class="editor-canvas-container" id="editor-canvas-container">
                <div class="editor-canvas-wrapper" id="editor-canvas-wrapper">
                    <!-- The actual letter paper -->
                    <div class="letter-paper" id="letter-paper">
                        <!-- Draggable elements go here -->
                    </div>
                </div>

                <!-- Floating Text Toolbar -->
                <div id="text-formatting-toolbar" class="floating-toolbar hidden">
                    <div class="toolbar-section">
                        <!-- Color Picker -->
                        <div class="color-picker-wrapper">
                            <button id="toolbar-color-btn" class="color-preview-btn"></button>
                            <div id="color-palette" class="color-palette hidden">
                                <div class="color-swatch" style="background-color: #866144;" data-color="#866144"></div>
                                <div class="color-swatch" style="background-color: #968571;" data-color="#968571"></div>
                                <div class="color-swatch" style="background-color: rgba(134, 97, 68, 0.7);" data-color="rgba(134, 97, 68, 0.7)"></div>
                                <div class="color-swatch" style="background-color: rgba(150, 133, 113, 0.5);" data-color="rgba(150, 133, 113, 0.5)"></div>
                            </div>
                        </div>
                    </div>

                    <div class="toolbar-section">
                        <!-- Font Family -->
                        <div class="custom-dropdown font-dropdown">
                            <button id="font-family-btn" class="dropdown-trigger"><span id="font-family-display">Geist</span> <span class="arrow">▼</span></button>
                            <ul id="font-family-list" class="dropdown-list hidden">
                                <li style="font-family: 'Geist Sans', sans-serif;" data-value="'Geist Sans', sans-serif">Geist</li>
                                <li style="font-family: 'Nunito', sans-serif;" data-value="'Nunito', sans-serif">Nunito</li>
                                <li style="font-family: 'Cedarville Cursive', cursive;" data-value="'Cedarville Cursive', cursive">Cedarville Cursive</li>
                                <li style="font-family: 'La Belle Aurore', cursive;" data-value="'La Belle Aurore', cursive">La Belle Aurore</li>
                                <li style="font-family: 'Space Mono', monospace;" data-value="'Space Mono', monospace">Space Mono</li>
                                <li style="font-family: 'Roboto Mono', monospace;" data-value="'Roboto Mono', monospace">Roboto Mono</li>
                                <li style="font-family: 'Patrick Hand', cursive;" data-value="'Patrick Hand', cursive">Patrick Hand</li>
                                <li style="font-family: 'Indie Flower', cursive;" data-value="'Indie Flower', cursive">Indie Flower</li>
                                <li style="font-family: 'Instrument Serif', serif;" data-value="'Instrument Serif', serif">Instrument Serif</li>
                                <li style="font-family: 'Playfair Display', serif;" data-value="'Playfair Display', serif">Playfair Display</li>
                            </ul>
                        </div>
                    </div>

                    <div class="toolbar-section">
                        <!-- Font Size -->
                        <div class="custom-dropdown size-dropdown">
                            <button id="font-size-btn" class="dropdown-trigger"><span id="font-size-display">24</span> <span class="arrow">▼</span></button>
                            <ul id="font-size-list" class="dropdown-list hidden">
                                <li data-value="14">14</li>
                                <li data-value="18">18</li>
                                <li data-value="24">24</li>
                                <li data-value="32">32</li>
                                <li data-value="48">48</li>
                            </ul>
                        </div>
                    </div>

                    <div class="toolbar-section">
                        <!-- Styling -->
                        <button class="toolbar-icon-btn format-btn" data-format="bold"><b>B</b></button>
                        <button class="toolbar-icon-btn format-btn" data-format="italic"><i>I</i></button>
                        <button class="toolbar-icon-btn format-btn" data-format="underline"><u>U</u></button>
                    </div>

                    <div class="toolbar-section">
                        <!-- Alignment -->
                        <button class="toolbar-icon-btn format-btn" data-format="align-left">⫷</button>
                        <button class="toolbar-icon-btn format-btn" data-format="align-center">≡</button>
                        <button class="toolbar-icon-btn format-btn" data-format="align-right">⫸</button>
                    </div>

                    <div class="toolbar-section">
                        <!-- Actions -->
                        <button class="toolbar-icon-btn action-btn" data-action="layer-up">⇧</button>
                        <button class="toolbar-icon-btn action-btn" data-action="layer-down">⇩</button>
                        <button class="toolbar-icon-btn action-btn" data-action="duplicate">⧉</button>
                        <button class="toolbar-icon-btn action-btn danger" data-action="delete">🗑</button>
                    </div>
                </div>

                <!-- Floating Controls -->
                <div class="floating-controls">
                    <button class="control-btn active">👆</button>
                    <button class="control-btn">✥</button>
                    <button class="control-btn">🔍-</button>
                    <button class="control-btn">🔍+</button>
                    <button class="control-btn">⛶</button>
                </div>
            </main>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
