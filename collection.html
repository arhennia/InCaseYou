<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InCaseYou - Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gorditas:wght@400;700&family=Great+Vibes&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="collection">
    <div id="app">
        <section class="view active">
            <div class="page-wrapper collection-wrapper">
                <header class="collection-header">
                    <div class="logo logo-left">incaseyou</div>
                    <div class="header-actions">
                        <button id="btn-nav-new-letter" class="btn-outline">+ NEW LETTER</button>
                        <button id="btn-share" class="btn-filled">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
                                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                                <polyline points="16 6 12 2 8 6"></polyline>
                                <line x1="12" y1="2" x2="12" y2="15"></line>
                            </svg>
                            SHARE
                        </button>
                    </div>
                </header>

                <main class="content-main collection-main">
                    <div class="recipient-info">
                        <h1 class="main-heading">for <span id="display-for">their name</span></h1>
                        <p class="muted-description" id="display-note">the description they added in the previous page</p>
                    </div>

                    <div id="letters-container" class="letters-grid empty">
                        <!-- Empty State -->
                        <div class="empty-state" id="empty-state">
                            <p>no letters yet. create your first one!</p>
                            <button id="btn-add-letter" class="btn-primary btn-small">+ ADD LETTER</button>
                        </div>
                    </div>

                    <div class="signature">
                        <p class="from-label">from,</p>
                        <h2 class="from-name" id="display-from">your name</h2>
                    </div>
                </main>
            </div>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
