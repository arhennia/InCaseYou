<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InCaseYou</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gorditas:wght@400;700&family=Great+Vibes&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="landing">
    <div id="app">
        <section class="view active">
            <div class="page-wrapper">
                <div class="absolute-logo">incaseyou</div>

                <main class="content-main">
                    <div class="narrow-content">
                        <h1 class="main-heading">made for you</h1>

                        <form id="creation-form" class="form-container">
                            <div class="input-row">
                                <div class="input-group">
                                    <label for="input-for">for:</label>
                                    <input type="text" id="input-for" placeholder="their name" required autocomplete="off">
                                </div>
                                <div class="input-group">
                                    <label for="input-from">from:</label>
                                    <input type="text" id="input-from" placeholder="your name" required autocomplete="off">
                                </div>
                            </div>

                            <div class="input-group full-width">
                                <div class="label-row">
                                    <label for="input-note">a little note:</label>
                                    <span class="char-counter"><span id="note-counter">0</span>/65</span>
                                </div>
                                <input type="text" id="input-note" placeholder="for whenever you need this" maxlength="65" required autocomplete="off">
                            </div>

                            <button type="submit" class="btn-primary mt-large">MAKE IT &rarr;</button>
                        </form>
                    </div>
                </main>
            </div>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
